name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore MicroStack.slnx

      - name: Build
        run: dotnet build MicroStack.slnx -c Release --no-restore

      - name: Test
        run: dotnet test --solution MicroStack.slnx -c Release --no-build --results-directory ./test-results --report-trx

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: './test-results/**/*.trx'

      - name: Pack NuGet packages
        run: dotnet pack src/MicroStack.Aspire.Hosting/MicroStack.Aspire.Hosting.csproj -c Release --no-build --output ./packages

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./packages/*.nupkg

      - name: Publish container image (local)
        run: >
          dotnet publish src/MicroStack/MicroStack.csproj
          /t:PublishContainer
          -r linux-musl-x64
          -c Release

      - name: Report container image size
        run: docker images microstack

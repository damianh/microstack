name: Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish-image:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag
        id: tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            echo "tags=${VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "tags=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish OCI image to GHCR
        run: >
          dotnet publish src/MicroStack/MicroStack.csproj
          /t:PublishContainer
          -c Release
          -p:ContainerRegistry=ghcr.io
          -p:ContainerRepository=${{ github.repository_owner }}/microstack
          -p:ContainerImageTag=${{ steps.tag.outputs.tags }}
